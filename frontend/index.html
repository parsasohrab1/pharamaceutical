<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HQCA — Drug Binding Simulator</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header>
    <h1>HQCA</h1>
    <p>سامانه شبیه‌ساز کوآنتوم-کلاسیک برای پیش‌بینی اتصال دارو</p>
  </header>

  <main>
    <section class="card" id="auth-section">
      <h2>ورود</h2>
      <input id="username" placeholder="نام کاربری" value="admin" />
      <input id="password" type="password" placeholder="رمز عبور" value="admin12345" />
      <button id="login-btn">ورود</button>
      <span id="auth-status"></span>
    </section>

    <section class="card">
      <h2>پیش‌بینی اتصال (FR-01 / FR-02)</h2>
      <label>SMILES</label>
      <input id="smiles" value="CCO" maxlength="200" />
      <label>FASTA</label>
      <textarea id="fasta" rows="4">>target
ACDEFGHIKLMNPQRSTVWY</textarea>
      <label>Backend (FR-13)</label>
      <select id="backend">
        <option value="auto">auto</option>
        <option value="pennylane_default_qubit">pennylane_default_qubit</option>
        <option value="qiskit_aer_simulator">qiskit_aer_simulator</option>
        <option value="classical_fallback">classical_fallback</option>
      </select>
      <button id="predict-btn">شبیه‌سازی</button>
    </section>

    <section class="card">
      <h2>تولید داده سنتتیک (FR-06)</h2>
      <label>تعداد نمونه (500–5000)</label>
      <input id="num-samples" type="number" min="1" max="5000" value="100" />
      <label>SMILES seed (comma-separated)</label>
      <input id="seed-smiles" value="CCO,CC(C)O" />
      <button id="generate-btn">شروع تولید</button>
      <pre id="task-status"></pre>
    </section>

    <section class="card" id="results">
      <h2>نتایج (FR-17 / FR-18 / FR-19)</h2>
      <div id="result-summary">—</div>
      <iframe id="viewer-frame" title="3D pocket viewer" style="width:100%;height:420px;border:0;display:none;"></iframe>
      <div id="download-links"></div>
    </section>
  </main>
  <script src="/app.js"></script>
</body>
</html>
