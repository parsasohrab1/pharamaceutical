<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HQCA — Drug Binding Dashboard</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header>
    <h1>HQCA Dashboard</h1>
    <p>سامانه شبیه‌ساز کوآنتوم-کلاسیک — داده‌های آماده نمایش</p>
  </header>

  <main>
    <section class="card stats-grid" id="stats-section">
      <div class="stat-box"><span id="stat-predictions">—</span><label>پیش‌بینی‌ها</label></div>
      <div class="stat-box"><span id="stat-datasets">—</span><label>دیتاست‌ها</label></div>
      <div class="stat-box"><span id="stat-avg-score">—</span><label>میانگین نمره</label></div>
    </section>

    <section class="card" id="auth-section">
      <h2>ورود</h2>
      <input id="username" placeholder="نام کاربری" value="admin" />
      <input id="password" type="password" placeholder="رمز عبور" value="admin12345" />
      <button id="login-btn">ورود</button>
      <span id="auth-status"></span>
    </section>

    <section class="card">
      <h2>نتایج ذخیره‌شده (FR-17 / FR-18 / FR-19)</h2>
      <div id="result-summary">در حال بارگذاری...</div>
      <div id="score-chart" class="chart"></div>
      <iframe id="viewer-frame" title="3D pocket viewer"></iframe>
      <div id="download-links"></div>
      <table id="history-table">
        <thead>
          <tr><th>SMILES</th><th>نمره</th><th>اطمینان</th><th>تاریخ</th></tr>
        </thead>
        <tbody id="history-body"></tbody>
      </table>
    </section>

    <section class="card">
      <h2>دیتاست سنتتیک آماده</h2>
      <div id="dataset-panel">در حال بارگذاری...</div>
    </section>

    <section class="card">
      <h2>پیش‌بینی جدید</h2>
      <label>SMILES</label>
      <input id="smiles" value="CCO" maxlength="200" />
      <label>FASTA</label>
      <textarea id="fasta" rows="3">>target
ACDEFGHIKLMNPQRSTVWY</textarea>
      <label>Backend</label>
      <select id="backend">
        <option value="auto">auto</option>
        <option value="pennylane_default_qubit">pennylane_default_qubit</option>
        <option value="classical_fallback">classical_fallback</option>
      </select>
      <button id="predict-btn">شبیه‌سازی</button>
    </section>

    <section class="card">
      <h2>تولید داده سنتتیک (FR-06)</h2>
      <input id="num-samples" type="number" min="1" max="5000" value="100" />
      <input id="seed-smiles" value="CCO,CC(C)O" />
      <button id="generate-btn">شروع تولید</button>
      <pre id="task-status"></pre>
    </section>
  </main>
  <script src="/app.js"></script>
</body>
</html>
