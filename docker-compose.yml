services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: hqca
      POSTGRES_PASSWORD: hqca
      POSTGRES_DB: hqca
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: hqca
      MINIO_ROOT_PASSWORD: hqca-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env.example
    environment:
      HQCA_DATABASE_URL: postgresql://hqca:hqca@db:5432/hqca
      HQCA_USE_MINIO: "true"
      MINIO_ENDPOINT: minio:9000
    depends_on:
      - db
      - minio
    volumes:
      - ./output:/app/output

  frontend:
    image: nginx:alpine
    ports:
      - "5173:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro

volumes:
  pgdata:
  minio_data:
