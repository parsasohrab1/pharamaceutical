services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      HQCA_DATABASE_URL: postgresql+psycopg://hqca:hqca@postgres:5432/hqca
      HQCA_SECRET_KEY: change-me-in-production
      HQCA_API_OUTPUT_DIR: /app/output/api
      HQCA_OBJECT_STORE_DIR: /app/output/objects
      HQCA_QUEUE_BACKEND: rq
      HQCA_REDIS_URL: redis://redis:6379/0
      HQCA_MINIO_ENDPOINT: minio:9000
      HQCA_MINIO_ACCESS_KEY: minioadmin
      HQCA_MINIO_SECRET_KEY: minioadmin
      HQCA_MINIO_BUCKET: hqca
      HQCA_MINIO_SECURE: "false"
    depends_on:
      - postgres
      - redis
      - minio
    volumes:
      - hqca-output:/app/output

  worker:
    build: .
    command: rq worker hqca --url redis://redis:6379/0
    environment:
      HQCA_DATABASE_URL: postgresql+psycopg://hqca:hqca@postgres:5432/hqca
      HQCA_SECRET_KEY: change-me-in-production
      HQCA_API_OUTPUT_DIR: /app/output/api
      HQCA_OBJECT_STORE_DIR: /app/output/objects
      HQCA_QUEUE_BACKEND: rq
      HQCA_REDIS_URL: redis://redis:6379/0
      HQCA_MINIO_ENDPOINT: minio:9000
      HQCA_MINIO_ACCESS_KEY: minioadmin
      HQCA_MINIO_SECRET_KEY: minioadmin
      HQCA_MINIO_BUCKET: hqca
      HQCA_MINIO_SECURE: "false"
    depends_on:
      - api
      - redis
    volumes:
      - hqca-output:/app/output

  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: hqca
      POSTGRES_USER: hqca
      POSTGRES_PASSWORD: hqca
    ports:
      - "5432:5432"
    volumes:
      - hqca-postgres:/var/lib/postgresql/data

  redis:
    image: redis:8
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - hqca-minio:/data

volumes:
  hqca-output:
  hqca-postgres:
  hqca-minio:
